# .github/workflows/build.yml
name: Build Pyinstaller Binaries

on:
  release:
    types: [created]
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← opt into Node 24 now

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: VRCParameterRelay
            output-ext: ""
          - os: windows-latest
            artifact-name: VRCParameterRelay
            output-ext: "exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      # --- Python +  CX_Freeze ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          pip install -r requirements.txt
          pip install pyinstaller

      # --- Build ---
      - name: Build with pyinstaller (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          pyinstaller --noconfirm VRCParameterRelay.spec

      - name: Build with pyinstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm VRCParameterRelay.spec

      # --- Upload ---
      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/${{ matrix.artifact-name }}*${{ matrix.output-ext }}
          retention-days: 30

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          working_directory: dist
          files: |
            ${{ matrix.artifact-name }}*${{ matrix.output-ext }}
